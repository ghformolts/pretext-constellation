<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretext Constellation Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        #canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #bubbles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            pointer-events: auto;
            cursor: grab;
            user-select: none;
            border-radius: 18px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            max-width: 300px;
            font-size: 14px;
            line-height: 1.5;
        }
        .bubble:hover { transform: scale(1.02); }
        .bubble.dragging {
            cursor: grabbing;
            z-index: 1000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .bubble-author {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .controls input {
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            width: 250px;
            font-size: 14px;
        }
        .controls input::placeholder { color: rgba(255,255,255,0.4); }
        .controls button {
            padding: 10px 18px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .controls button:hover { background: rgba(255,255,255,0.25); }
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            opacity: 0.6;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="title">Pretext Constellation • Drag to explore</div>
    <canvas id="canvas"></canvas>
    <div id="bubbles"></div>
    <div class="controls">
        <input type="text" id="msgInput" placeholder="Type message..." />
        <button onclick="addMessage()">Send</button>
        <button onclick="addRandom()">Random</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <script type="module">
        // Import Pretext from esm.sh
        import { prepare, layout } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bubblesContainer = document.getElementById('bubbles');
        const msgInput = document.getElementById('msgInput');

        let messages = [];
        let draggedMsg = null;
        let dragOffset = { x: 0, y: 0 };
        let showLines = true;

        // Resize canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Sample messages
        const samples = [
            { text: "Hey, have you seen this new library?", author: "Alice" },
            { text: "Pretext is amazing for text layout without DOM reflow!", author: "Bob" },
            { text: "The performance gains are incredible", author: "Charlie" },
            { text: "No more getBoundingClientRect thrashing", author: "Diana" },
            { text: "Perfect for chat interfaces like this one", author: "Eve" },
            { text: "Smooth 60fps even with hundreds of messages", author: "Frank" },
            { text: "I love how it handles all languages", author: "Grace" },
            { text: "中文 العربية emoji 🚀 all work perfectly", author: "Hans" },
            { text: "The API is so clean: prepare() then layout()", author: "Ivy" },
            { text: "Cheng Lou did an amazing job with this", author: "Jack" }
        ];

        // Measure text using Pretext
        function measureWithPretext(text, maxWidth = 250) {
            const prepared = prepare(text, '14px -apple-system, BlinkMacSystemFont, sans-serif');
            const result = layout(prepared, maxWidth, 21); // 21px line height
            
            return {
                width: Math.min(result.width + 36, maxWidth + 36), // padding
                height: result.height + 28, // padding
                lineCount: result.lineCount,
                prepared: prepared
            };
        }

        // Create a message bubble
        function createBubble(text, author) {
            const measurements = measureWithPretext(text);
            
            // Spiral positioning
            const idx = messages.length;
            const angle = idx * 0.8;
            const radius = 120 + idx * 25;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            const x = cx + Math.cos(angle) * radius - measurements.width / 2;
            const y = cy + Math.sin(angle) * radius * 0.7 - measurements.height / 2;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.width = `${measurements.width}px`;
            bubble.style.left = `${x}px`;
            bubble.style.top = `${y}px`;
            
            bubble.innerHTML = `
                <div class="bubble-author">${author}</div>
                <div>${escapeHtml(text)}</div>
            `;

            const msg = {
                element: bubble,
                x: x + measurements.width / 2,
                y: y + measurements.height / 2,
                width: measurements.width,
                height: measurements.height,
                text, author,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            };
            
            messages.push(msg);
            bubblesContainer.appendChild(bubble);

            // Drag events
            bubble.addEventListener('mousedown', (e) => startDrag(e, msg));
            bubble.addEventListener('touchstart', (e) => startDrag(e, msg), {passive: false});

            // Animate in
            bubble.style.opacity = '0';
            bubble.style.transform = 'scale(0.8)';
            requestAnimationFrame(() => {
                bubble.style.transition = 'opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
                bubble.style.opacity = '1';
                bubble.style.transform = 'scale(1)';
                setTimeout(() => {
                    bubble.style.transition = 'transform 0.15s ease, box-shadow 0.2s ease';
                }, 300);
            });

            return msg;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function startDrag(e, msg) {
            e.preventDefault();
            e.stopPropagation();
            draggedMsg = msg;
            msg.element.classList.add('dragging');
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = msg.element.getBoundingClientRect();
            dragOffset.x = clientX - rect.left;
            dragOffset.y = clientY - rect.top;
        }

        function onMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            if (draggedMsg) {
                const newX = clientX - dragOffset.x;
                const newY = clientY - dragOffset.y;
                
                draggedMsg.element.style.left = `${newX}px`;
                draggedMsg.element.style.top = `${newY}px`;
                draggedMsg.x = newX + draggedMsg.width / 2;
                draggedMsg.y = newY + draggedMsg.height / 2;
            }
        }

        function onEnd() {
            if (draggedMsg) {
                draggedMsg.element.classList.remove('dragging');
                draggedMsg = null;
            }
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onEnd);

        // Draw background stars and constellation lines
        const stars = Array(100).fill().map(() => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 2,
            twinkle: Math.random() * Math.PI * 2
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            stars.forEach(star => {
                star.twinkle += 0.02;
                const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw constellation lines
            if (showLines && messages.length > 1) {
                ctx.strokeStyle = 'rgba(100, 150, 255, 0.15)';
                ctx.lineWidth = 1;
                
                for (let i = 0; i < messages.length; i++) {
                    for (let j = i + 1; j < messages.length; j++) {
                        const dx = messages[i].x - messages[j].x;
                        const dy = messages[i].y - messages[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 250) {
                            const alpha = (1 - dist / 250) * 0.3;
                            ctx.strokeStyle = `rgba(100, 150, 255, ${alpha})`;
                            ctx.beginPath();
                            ctx.moveTo(messages[i].x, messages[i].y);
                            ctx.lineTo(messages[j].x, messages[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }
            
            requestAnimationFrame(draw);
        }
        draw();

        // Public functions
        window.addMessage = () => {
            const text = msgInput.value.trim();
            if (text) {
                createBubble(text, 'You');
                msgInput.value = '';
            }
        };

        window.addRandom = () => {
            const s = samples[Math.floor(Math.random() * samples.length)];
            createBubble(s.text, s.author);
        };

        window.clearAll = () => {
            bubblesContainer.innerHTML = '';
            messages = [];
        };

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.addMessage();
        });

        // Add initial messages
        samples.slice(0, 5).forEach((s, i) => {
            setTimeout(() => createBubble(s.text, s.author), i * 150);
        });
    </script>
</body>
</html>
